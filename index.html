<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DoorCalc Pro — Расчет межкомнатных дверей</title>
<style>
:root {
  --bg: #f4f5f7;
  --card-bg: #ffffff;
  --text: #1c1f26;
  --muted: #6b7280;
  --border: #e2e4e9;
  --accent: #2f6feb;
  --ok: #1a7f37;
  --ok-bg: #e6f4ea;
  --warn: #b54708;
  --warn-bg: #fff4e5;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14161a;
    --card-bg: #1c1f26;
    --text: #eef0f3;
    --muted: #9aa1ac;
    --border: #2c3038;
    --accent: #6ea0ff;
    --ok: #4cc264;
    --ok-bg: #163420;
    --warn: #f2a44b;
    --warn-bg: #3a2a12;
  }
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 32px 16px;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
}

.calc-card {
  width: 100%;
  max-width: 480px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

h1 { font-size: 20px; margin: 0 0 4px; }

.field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.field-row { display: flex; gap: 12px; }

label { font-size: 13px; font-weight: 600; color: var(--muted); }

select, input[type="number"] {
  font-size: 15px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  width: 100%;
}

select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

.size-info { margin-top: -8px; display: flex; flex-direction: column; gap: 6px; }

.badge {
  display: inline-block;
  width: fit-content;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 999px;
}

.badge-ok { color: var(--ok); background: var(--ok-bg); }
.badge-warn { color: var(--warn); background: var(--warn-bg); }

.warning { display: none; font-size: 12px; color: var(--warn); }

.options { display: flex; flex-direction: column; gap: 10px; }

.option-row { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.option-row .option-price { margin-left: auto; color: var(--muted); font-size: 13px; }

.option-group { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.option-group-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.option-choices { display: flex; flex-wrap: wrap; gap: 12px; }
.option-choice { display: flex; align-items: center; gap: 6px; font-size: 14px; }
.option-choice .option-price { color: var(--muted); font-size: 12px; }

.color-preview {
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 8px;
  border: 1px solid var(--border);
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}

.color-preview-label {
  width: 100%;
  padding: 6px 10px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  background: rgba(0, 0, 0, 0.45);
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
}

.result { border-top: 1px solid var(--border); padding-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.breakdown { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--muted); }

.total-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 18px; font-weight: 700; margin-top: 4px; }
.total-value { color: var(--accent); font-size: 24px; }
</style>
</head>
<body>
  <main class="calc-card">
    <h1>Расчет — межкомнатные двери</h1>

    <div class="field">
      <label for="model">Модель</label>
      <select id="model"></select>
    </div>

    <div class="field">
      <label for="material">Материал</label>
      <select id="material"></select>
    </div>

    <div class="field">
      <label for="color">Цвет</label>
      <select id="color"></select>
    </div>

    <div class="field">
      <div id="colorPreview" class="color-preview">
        <span id="colorPreviewLabel" class="color-preview-label"></span>
      </div>
    </div>

    <div class="field">
      <label for="glass">Стекло</label>
      <select id="glass"></select>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="height">Высота, мм</label>
        <input type="number" id="height" step="1">
      </div>
      <div class="field">
        <label for="width">Ширина, мм</label>
        <input type="number" id="width" step="1">
      </div>
      <div class="field">
        <label for="thickness">Толщина, мм</label>
        <input type="number" id="thickness" step="1">
      </div>
    </div>
    <div class="size-info">
      <span id="sizeBadge" class="badge"></span>
      <div id="thicknessWarning" class="warning">42 мм доступна только для щитовых полотен</div>
    </div>

    <div class="field">
      <label>Опции</label>
      <div id="options" class="options"></div>
    </div>

    <div class="field">
      <label for="discount">Скидка, %</label>
      <input type="number" id="discount" step="0.1" min="0" max="100">
    </div>

    <div class="result">
      <div id="breakdown" class="breakdown"></div>
      <div class="total-row">
        <span>Итоговая стоимость</span>
        <span id="total" class="total-value">0 ₽</span>
      </div>
    </div>
  </main>

<script>
/*
 * DoorCalc Pro — база данных (v0.2)
 *
 * ВАЖНО: базовые цены моделей (basePrice) и цена стекол (price в DB.glass)
 * не были предоставлены в исходном ТЗ и в загруженном файле-каталоге моделей —
 * там был только список из 74 названий моделей без цен. Здесь проставлены
 * условные значения-заглушки, чтобы калькулятор был полностью рабочим уже
 * сейчас. Перед реальным использованием замените значения на актуальные.
 *
 * Также не указан тип полотна (Сборное / Щитовое) для каждой конкретной
 * модели — по умолчанию всем моделям присвоен тип "щитовое" (более
 * универсальный: допускает и ПВХ, и эмаль). Поправьте поле `type` для тех
 * моделей, которые на самом деле являются сборными.
 */

const DB = {
  models: [
    "LX2", "Модерн LX2", "L-1", "Модерн 13", "Линия", "Соренто 2 ПГ", "Соренто 1",
    "Урбан", "Галант 1", "Лувр", "Рим 3 ПГ", "Неоклассика 4", "Сидней 2", "Галант 2",
    "Техно V2", "Техно G", "Техно V", "Модерн 1", "Модерн LX11", "Модерн LX3",
    "Модерн S", "Модерн S3", "Модерн S4", "Модерн ПГ", "Рим 1 ПГ", "Рим 2 ПГ",
    "Рим Лайт 2 ПО", "Рим 2 Лайт ПГ", "Рим 2 ПО", "Рим Лайт 3 ПГ", "Рим 3 ПО",
    "Рим ЛАЙТ 3 ПО", "Новелла", "Британия ПГ", "Британия ПО", "Соренто 2 ПО",
    "Водопад", "Виктория", "Нота", "Вектор", "Лего", "Нордик", "Вертикаль 75",
    "Вертикаль 150", "Вертикаль 2", "Водопад 2", "Версаль 1", "Версаль 2",
    "Версаль 3", "Турин 1", "Турин 2", "Турин 3", "S-2", "Тотал", "Неоклассика 2",
    "Пламя 1 ПГ", "Пламя 2 ПО", "Иван да Марья", "Ампир 2 ПГ", "Ампир 2 ПО",
    "Турин 1 ПО", "Элина ПГ", "Элина ПО", "Венеция ПГ", "Венеция ПО", "Барокко 2",
    "Версаль 2 ПО", "Неоклассика 4.2", "Версаль 3 ПО", "Сумгаит ПГ", "Сумгаит ПО",
    "Турин 3 ПО", "Инвизибл", "Оскар"
  ].map((name, i) => ({
    id: "m" + i,
    name,
    type: "щитовое",
    basePrice: 5000
  })),

  colors: {
    "пвх": {
      0: ["Арктик", "Пацифик"],
      1: ["Эшвайт", "Беленый дуб", "Ривьера Айс", "Ривьера Грей", "Белая структурная"],
      2: ["Бетон Антрацит", "Бетон Светлый", "Грей", "Дуб Белый", "Дуб Шале Золото", "Орех", "Шагрень Белая", "Шагрень Серая", "Ясень Серебристый"],
      3: ["Бетон Лофт Натуральный", "Дуб Санремо Шоколад", "Софт Белый"],
      4: ["Белоснежная Эмаль", "Ваниль", "Графит Черный", "Кварцит", "Макиато", "Эмалит Серый"]
    },
    "эмаль": {
      1: ["Белая", "Крем 1013", "Жемчуг 9016", "Серая 7040", "Серая 7042"],
      2: ["RAL", "Любой цвет на заказ"]
    }
  },

  // Категория 0 — новые цвета, наценка ещё не согласована (см. README)
  categorySurcharge: {
    "пвх": { 0: 0, 1: 0, 2: 600, 3: 1300, 4: 2700 },
    "эмаль": { 1: 0, 2: 2600 }
  },

  // Оцифровка реальных образцов плёнок ПВХ (фото 15x20 см, кадрировано без бликов и фона).
  // hex — усреднённый цвет образца, image — кадрированная текстура для будущей визуализации дверей.
  colorSwatches: {
    "Белоснежная Эмаль": { hex: "#aeaba3", image: "assets/colors/pvh/белоснежная_эмаль.jpg" },
    "Ваниль": { hex: "#b0a69b", image: "assets/colors/pvh/ваниль.jpg" },
    "Кварцит": { hex: "#9c9087", image: "assets/colors/pvh/кварцит.jpg" },
    "Макиато": { hex: "#c0a791", image: "assets/colors/pvh/макиато.jpg" },
    "Эмалит Серый": { hex: "#a19d9a", image: "assets/colors/pvh/эмалит_серый.jpg" },
    "Графит Черный": { hex: "#56575b", image: "assets/colors/pvh/графит_черный.jpg" },
    "Белая структурная": { hex: "#9e9c9c", image: "assets/colors/pvh/белая_структурная.jpg" },
    "Дуб Белый": { hex: "#8f8b8c", image: "assets/colors/pvh/дуб_белый.jpg" },
    "Софт Белый": { hex: "#b8b6b6", image: "assets/colors/pvh/софт_белый.jpg" },
    "Шагрень Белая": { hex: "#93918c", image: "assets/colors/pvh/шагрень_белая.jpg" },
    "Ривьера Айс": { hex: "#8f8c87", image: "assets/colors/pvh/ривьера_айс.jpg" },
    "Бетон Светлый": { hex: "#87847f", image: "assets/colors/pvh/бетон_светлый.jpg" },
    "Эшвайт": { hex: "#85807b", image: "assets/colors/pvh/эшвайт.jpg" },
    "Ясень Серебристый": { hex: "#87837e", image: "assets/colors/pvh/ясень_серебристый.jpg" },
    "Беленый дуб": { hex: "#878079", image: "assets/colors/pvh/беленый_дуб.jpg" },
    "Шагрень Серая": { hex: "#84807b", image: "assets/colors/pvh/шагрень_серая.jpg" },
    "Арктик": { hex: "#908b84", image: "assets/colors/pvh/арктик.jpg" },
    "Дуб Шале Золото": { hex: "#93897c", image: "assets/colors/pvh/дуб_шале_золото.jpg" },
    "Пацифик": { hex: "#988e80", image: "assets/colors/pvh/пацифик.jpg" },
    "Бетон Лофт Натуральный": { hex: "#878076", image: "assets/colors/pvh/бетон_лофт_натуральный.jpg" },
    "Ривьера Грей": { hex: "#847d74", image: "assets/colors/pvh/ривьера_грей.jpg" },
    "Грей": { hex: "#8b857c", image: "assets/colors/pvh/грей.jpg" },
    "Орех": { hex: "#7a5945", image: "assets/colors/pvh/орех.jpg" },
    "Дуб Санремо Шоколад": { hex: "#6d5d51", image: "assets/colors/pvh/дуб_санремо_шоколад.jpg" },
    "Бетон Антрацит": { hex: "#67615a", image: "assets/colors/pvh/бетон_антрацит.jpg" }
  },

  glass: [
    { id: "none", name: "Глухая (без стекла)", price: 0 },
    { id: "satin", name: "Сатин матовый", price: 0 },
    { id: "black", name: "Черное", price: 0 },
    { id: "mirror", name: "Зеркало", price: 0 },
    { id: "white", name: "Белое", price: 0 },
    { id: "rim2", name: "Рим 2", price: 0 },
    { id: "rim3", name: "Рим 3", price: 0 },
    { id: "elina", name: "Элина", price: 0 },
    { id: "venice", name: "Венеция", price: 0 },
    { id: "versal2", name: "Версаль 2", price: 0 },
    { id: "versal3", name: "Версаль 3", price: 0 },
    { id: "turin2", name: "Турин 2", price: 0 },
    { id: "turin3", name: "Турин 3", price: 0 },
    { id: "sumgait", name: "Сумгаит", price: 0 }
  ],

  options: {
    "пвх": [
      { id: "reinforce", name: "Усиление конструкции", kind: "checkbox", price: 2400 },
      {
        id: "al_edge", name: "AL кромка", kind: "radio",
        choices: [
          { label: "Нет", price: 0 },
          { label: "2 стороны", price: 2000 },
          { label: "4 стороны", price: 4000 }
        ]
      },
      {
        id: "pvc_edge", name: "ПВХ кромка 2 мм", kind: "radio",
        choices: [
          { label: "Нет", price: 0 },
          { label: "2 стороны", price: 1300 },
          { label: "4 стороны", price: 2700 }
        ]
      }
    ],
    "эмаль": [
      { id: "reinforce", name: "Усиление", kind: "checkbox", price: 4000 },
      {
        id: "al_edge", name: "AL кромка", kind: "radio",
        choices: [
          { label: "Нет", price: 0 },
          { label: "2 стороны", price: 3100 },
          { label: "4 стороны", price: 6300 }
        ]
      }
    ]
  },

  standard: {
    height: 2000,
    widths: [400, 600, 700, 800, 900],
    thickness: 36
  }
};

(function () {
  "use strict";

  const state = {
    modelId: null,
    material: "пвх",
    color: null,
    glassId: "none",
    height: DB.standard.height,
    width: DB.standard.widths[3],
    thickness: DB.standard.thickness,
    options: {},
    discount: 0
  };

  const el = {
    model: document.getElementById("model"),
    material: document.getElementById("material"),
    color: document.getElementById("color"),
    colorPreview: document.getElementById("colorPreview"),
    colorPreviewLabel: document.getElementById("colorPreviewLabel"),
    glass: document.getElementById("glass"),
    height: document.getElementById("height"),
    width: document.getElementById("width"),
    thickness: document.getElementById("thickness"),
    sizeBadge: document.getElementById("sizeBadge"),
    thicknessWarning: document.getElementById("thicknessWarning"),
    options: document.getElementById("options"),
    discount: document.getElementById("discount"),
    breakdown: document.getElementById("breakdown"),
    total: document.getElementById("total")
  };

  function getModel(id) {
    return DB.models.find((m) => m.id === id);
  }

  function roundUp10(value) {
    return Math.ceil(value / 10) * 10;
  }

  function isStandardSize(height, width, thickness) {
    return (
      height === DB.standard.height &&
      DB.standard.widths.includes(width) &&
      thickness === DB.standard.thickness
    );
  }

  function findCategory(material, color) {
    const groups = DB.colors[material] || {};
    for (const category of Object.keys(groups)) {
      if (groups[category].includes(color)) return Number(category);
    }
    return null;
  }

  function populateModels() {
    el.model.innerHTML = DB.models
      .map((m) => `<option value="${m.id}">${m.name}</option>`)
      .join("");
    state.modelId = DB.models[0].id;
  }

  function availableMaterials(model) {
    if (model.type === "сборное") return ["пвх"];
    return ["пвх", "эмаль"];
  }

  function populateMaterial() {
    const model = getModel(state.modelId);
    const materials = availableMaterials(model);
    el.material.innerHTML = materials
      .map((m) => `<option value="${m}">${m === "пвх" ? "Пленка ПВХ" : "Эмаль"}</option>`)
      .join("");
    if (!materials.includes(state.material)) state.material = materials[0];
    el.material.value = state.material;
  }

  function populateColors() {
    const groups = DB.colors[state.material] || {};
    const optionsHtml = Object.keys(groups)
      .sort()
      .map((cat) => groups[cat].map((c) => `<option value="${c}">${c}</option>`).join(""))
      .join("");
    el.color.innerHTML = optionsHtml;
    const allColors = Object.values(groups).flat();
    if (!allColors.includes(state.color)) state.color = allColors[0];
    el.color.value = state.color;
  }

  function populateGlass() {
    el.glass.innerHTML = DB.glass
      .map((g) => `<option value="${g.id}">${g.name}</option>`)
      .join("");
    el.glass.value = state.glassId;
  }

  function populateOptions() {
    const optionDefs = DB.options[state.material] || [];
    state.options = {};
    el.options.innerHTML = optionDefs
      .map((opt) => {
        if (opt.kind === "checkbox") {
          state.options[opt.id] = false;
          return `
            <label class="option-row">
              <input type="checkbox" data-opt="${opt.id}" data-kind="checkbox">
              <span>${opt.name}</span>
              <span class="option-price">+${opt.price} ₽</span>
            </label>`;
        }
        state.options[opt.id] = 0;
        const choices = opt.choices
          .map(
            (c, i) => `
              <label class="option-choice">
                <input type="radio" name="opt-${opt.id}" data-opt="${opt.id}" data-kind="radio" value="${i}" ${i === 0 ? "checked" : ""}>
                <span>${c.label}</span>
                <span class="option-price">${c.price ? "+" + c.price + " ₽" : ""}</span>
              </label>`
          )
          .join("");
        return `
          <div class="option-group">
            <div class="option-group-title">${opt.name}</div>
            <div class="option-choices">${choices}</div>
          </div>`;
      })
      .join("");
  }

  function sumSelectedOptions() {
    const optionDefs = DB.options[state.material] || [];
    let sum = 0;
    const lines = [];
    optionDefs.forEach((opt) => {
      if (opt.kind === "checkbox") {
        if (state.options[opt.id]) {
          sum += opt.price;
          lines.push(`${opt.name}: +${opt.price} ₽`);
        }
      } else {
        const idx = state.options[opt.id] || 0;
        const choice = opt.choices[idx];
        if (choice && choice.price) {
          sum += choice.price;
          lines.push(`${opt.name} (${choice.label}): +${choice.price} ₽`);
        }
      }
    });
    return { sum, lines };
  }

  function updateSizeUI() {
    const standard = isStandardSize(state.height, state.width, state.thickness);
    el.sizeBadge.textContent = standard ? "Стандарт" : "Нестандарт (+30%)";
    el.sizeBadge.className = "badge " + (standard ? "badge-ok" : "badge-warn");

    const model = getModel(state.modelId);
    const thicknessInvalid = state.thickness === 42 && model.type !== "щитовое";
    el.thicknessWarning.style.display = thicknessInvalid ? "block" : "none";
  }

  function updateColorPreview() {
    const swatch = DB.colorSwatches[state.color];
    el.colorPreview.style.backgroundImage = swatch ? `url("${swatch.image}")` : "none";
    el.colorPreview.style.backgroundColor = swatch ? swatch.hex : "var(--border)";
    el.colorPreviewLabel.textContent = state.color || "";
  }

  function render() {
    const model = getModel(state.modelId);
    const category = findCategory(state.material, state.color);
    const surcharge = category != null ? (DB.categorySurcharge[state.material][category] || 0) : 0;

    let leafPrice = model.basePrice + surcharge;
    const standard = isStandardSize(state.height, state.width, state.thickness);
    const leafBeforeNonstandard = leafPrice;
    if (!standard) leafPrice = roundUp10(leafPrice * 1.3);

    const { sum: optionsSum, lines: optionLines } = sumSelectedOptions();
    const glass = DB.glass.find((g) => g.id === state.glassId);
    const glassPrice = glass ? glass.price : 0;

    const subtotal = leafPrice + optionsSum + glassPrice;
    const discount = Number(state.discount) || 0;
    const total = Math.round(subtotal * (1 - discount / 100));

    updateSizeUI();
    updateColorPreview();

    const rows = [];
    rows.push(`Полотно (${model.name}): ${leafBeforeNonstandard} ₽`);
    if (!standard) rows.push(`Наценка за нестандарт (×1.3, округление вверх до 10 ₽): ${leafPrice} ₽`);
    optionLines.forEach((l) => rows.push(l));
    if (glassPrice) rows.push(`Стекло (${glass.name}): +${glassPrice} ₽`);
    rows.push(`Подытог: ${subtotal} ₽`);
    if (discount) rows.push(`Скидка ${discount}%: -${Math.round(subtotal * discount / 100)} ₽`);

    el.breakdown.innerHTML = rows.map((r) => `<div class="breakdown-row">${r}</div>`).join("");
    el.total.textContent = total.toLocaleString("ru-RU") + " ₽";
  }

  function bind() {
    el.model.addEventListener("change", () => {
      state.modelId = el.model.value;
      populateMaterial();
      populateColors();
      populateOptions();
      render();
    });
    el.material.addEventListener("change", () => {
      state.material = el.material.value;
      populateColors();
      populateOptions();
      render();
    });
    el.color.addEventListener("change", () => {
      state.color = el.color.value;
      render();
    });
    el.glass.addEventListener("change", () => {
      state.glassId = el.glass.value;
      render();
    });
    [el.height, el.width, el.thickness].forEach((input) => {
      input.addEventListener("input", () => {
        state.height = Number(el.height.value) || 0;
        state.width = Number(el.width.value) || 0;
        state.thickness = Number(el.thickness.value) || 0;
        render();
      });
    });
    el.options.addEventListener("change", (e) => {
      const target = e.target;
      if (!target.dataset.opt) return;
      if (target.dataset.kind === "checkbox") {
        state.options[target.dataset.opt] = target.checked;
      } else {
        state.options[target.dataset.opt] = Number(target.value);
      }
      render();
    });
    el.discount.addEventListener("input", () => {
      state.discount = el.discount.value;
      render();
    });
  }

  function init() {
    populateModels();
    populateMaterial();
    populateColors();
    populateGlass();
    populateOptions();
    el.height.value = state.height;
    el.width.value = state.width;
    el.thickness.value = state.thickness;
    el.discount.value = state.discount;
    bind();
    render();
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
