<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DoorCalc Pro — Расчет межкомнатных дверей</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="calc-card">
    <h1>Расчет — межкомнатные двери</h1>

    <div class="field">
      <label for="model">Модель</label>
      <select id="model"></select>
    </div>

    <div class="field">
      <label for="material">Материал</label>
      <select id="material"></select>
    </div>

    <div class="field">
      <label for="color">Цвет</label>
      <select id="color"></select>
    </div>

    <div class="field">
      <label for="glass">Стекло</label>
      <select id="glass"></select>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="height">Высота, мм</label>
        <input type="number" id="height" step="1">
      </div>
      <div class="field">
        <label for="width">Ширина, мм</label>
        <input type="number" id="width" step="1">
      </div>
      <div class="field">
        <label for="thickness">Толщина, мм</label>
        <input type="number" id="thickness" step="1">
      </div>
    </div>
    <div class="size-info">
      <span id="sizeBadge" class="badge"></span>
      <div id="thicknessWarning" class="warning">42 мм доступна только для щитовых полотен</div>
    </div>

    <div class="field">
      <label>Опции</label>
      <div id="options" class="options"></div>
    </div>

    <div class="field">
      <label for="discount">Скидка, %</label>
      <input type="number" id="discount" step="0.1" min="0" max="100">
    </div>

    <div class="result">
      <div id="breakdown" class="breakdown"></div>
      <div class="total-row">
        <span>Итоговая стоимость</span>
        <span id="total" class="total-value">0 ₽</span>
      </div>
    </div>
  </main>

  <script src="data/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
